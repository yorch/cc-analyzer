name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & format check
        run: bun run lint

      - name: Typecheck (core/CLI/TUI/web-server)
        run: bun run typecheck

      - name: Typecheck (web SPA)
        run: bun run typecheck:web

      - name: Test
        run: bun test

      - name: Build (SPA embed + single binary)
        run: bun run build
