name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      matrix:
        # macOS leg exercises the platform we ship darwin binaries for.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & format check
        run: bun run lint

      - name: Typecheck (core/CLI/TUI/web-server)
        run: bun run typecheck

      - name: Typecheck (web SPA)
        run: bun run typecheck:web

      - name: Test
        run: bun test

      - name: Build (SPA embed + single binary)
        run: bun run build
