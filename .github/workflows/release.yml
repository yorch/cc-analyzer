name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  # Build-provenance attestation signs the artifacts with a workflow identity
  # (via OIDC) that code running inside the job cannot forge — unlike the
  # same-job SHA256SUMS, which only proves integrity.
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # The compiled binary embeds package.json's version; a tag on a commit
      # with a stale version ships binaries that report the wrong version and
      # then see themselves as perpetually out of date.
      - name: Verify tag matches package.json version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          pkg="v$(jq -r .version package.json)"
          if [ "$pkg" != "$TAG" ]; then
            echo "::error::tag $TAG does not match package.json version $pkg"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build & embed the web UI
        run: bun run build:web

      - name: Compile cross-platform binaries
        run: |
          mkdir -p dist
          targets=(
            "bun-linux-x64:cc-analyzer-linux-x64"
            "bun-linux-arm64:cc-analyzer-linux-arm64"
            "bun-darwin-x64:cc-analyzer-darwin-x64"
            "bun-darwin-arm64:cc-analyzer-darwin-arm64"
            "bun-windows-x64:cc-analyzer-windows-x64.exe"
          )
          for entry in "${targets[@]}"; do
            target="${entry%%:*}"
            out="${entry##*:}"
            echo "::group::Compiling $out ($target)"
            bun build --compile --minify --target="$target" \
              --outfile "dist/$out" src/cli/index.ts
            echo "::endgroup::"
          done
          ls -lh dist

      - name: Generate checksums
        run: |
          # Run inside dist/ so manifest entries are basenames, not dist/… paths.
          cd dist && sha256sum cc-analyzer-* > SHA256SUMS
          cat SHA256SUMS

      # Signed provenance for each binary, verifiable with:
      #   gh attestation verify <binary> --repo yorch/cc-analyzer
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/cc-analyzer-*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/cc-analyzer-* dist/SHA256SUMS
